# Annotated example `experiment.toml` (sweep-expanded normalized form).
#
# Pair with `common.toml` (next to it). For β's `gaussian-pipeline` CLI shim,
# this file MUST contain exactly one `[[step]]` (multi-step DAG resolution is
# δ's responsibility — see meta-spec §5.1).
#
# Schema per docs/specs/2026-05-04-experiment-manager-alpha-D-design.md §5.2.
# Strict loader: unknown keys, type mismatches, sweep notation all rejected.

[experiment]
id   = "exp_smoke_single_step"
tags = { project = "smoke" }

[[step]]
program      = "gaussian"        # lowercase canonical
calc_type    = "opt"             # ("gaussian", "opt") resolves to GaussianParams
compounds    = ["ROSDSFDQCJNGOL-UHFFFAOYSA-O"]
parent_uuids = []                # empty = root step (no consume-parent-results preamble rendered)
tags         = { basis = "6-31g(d)" }

[step.params]
route        = "#p opt b3lyp/6-31g(d)"
charge       = 0
multiplicity = 1
extra_input  = ""